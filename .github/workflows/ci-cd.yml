name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Allow only one concurrent deployment
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix Backend

      - name: Install Frontend Dependencies
        run: npm ci --prefix my-app

      - name: Lint Frontend
        run: npm run lint --prefix my-app

      - name: Run Backend Tests
        run: npm run test --prefix Backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/portfolio_test' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_jwt_secret_123' }}

      - name: Run Frontend Tests
        run: npm run test --prefix my-app

  deploy-vercel:
    name: Deploy Frontend to Vercel
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL secret is not set — skipping deployment."
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Vercel deploy triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ Failed to trigger Vercel deploy (HTTP $HTTP_CODE)"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

  deploy-koyeb:
    name: Deploy Backend to Koyeb
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Koyeb Redeploy
        run: |
          if [ -z "$KOYEB_API_TOKEN" ] || [ -z "$KOYEB_APP_ID" ] || [ -z "$KOYEB_SERVICE_ID" ]; then
            echo "::warning::Koyeb secrets not set — skipping deployment."
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://app.koyeb.com/v1/services/${KOYEB_SERVICE_ID}/redeploy" \
            -H "Authorization: Bearer ${KOYEB_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Koyeb redeploy triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ Failed to trigger Koyeb redeploy (HTTP $HTTP_CODE)"
            exit 1
          fi
        env:
          KOYEB_API_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
          KOYEB_APP_ID: ${{ secrets.KOYEB_APP_ID }}
          KOYEB_SERVICE_ID: ${{ secrets.KOYEB_SERVICE_ID }}
