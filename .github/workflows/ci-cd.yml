name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Grant permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix Backend

      - name: Install Frontend Dependencies
        run: npm ci --prefix my-app

      - name: Lint Frontend
        run: npm run lint --prefix my-app

      - name: Run Backend Tests
        run: npm run test --prefix Backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/portfolio_test' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_jwt_secret_123' }}

      - name: Run Frontend Tests
        run: npm run test --prefix my-app

  build:
    name: Build Frontend
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          npm ci --prefix my-app

      - name: Build Frontend (Vite)
        run: npm run build --prefix my-app

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './my-app/dist'

  deploy-github-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-render:
    name: Deploy to Render
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deployment."
            exit 0
          fi
          curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL" | grep -q "200" \
            && echo "✅ Render deploy triggered successfully" \
            || (echo "❌ Failed to trigger Render deploy" && exit 1)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
